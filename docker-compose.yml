services:
  postgres:
    image: postgres:15
    container_name: postgres_binance
    ports:
      - '5433:5432'
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-binance}
      - POSTGRES_PASSWORD=${POSTGRES_PASS}
      - POSTGRES_DB=${POSTGRES_DB}
    command: ["postgres", "-c", "wal_level=logical"]
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - streaming_net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - streaming_net

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - streaming_net

  kafka-connect:
    build:
      context: .
      dockerfile: docker/debezium/Dockerfile.debezium
    container_name: debezium
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses
      KEY_CONVERTER: io.confluent.connect.avro.AvroConverter
      VALUE_CONVERTER: io.confluent.connect.avro.AvroConverter
      CONNECT_KEY_CONVERTER_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      CONNECT_VALUE_CONVERTER_SCHEMA_REGISTRY_URL: http://schema-registry:8081
    depends_on:
      schema-registry:
        condition: service_healthy
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - streaming_net

  schema-registry:
    image: confluentinc/cp-schema-registry:7.4.0
    container_name: schema_registry
    ports:
      - "${SCHEMA_PORT:-8082}:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema_registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: 'kafka:29092'
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck: 
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - streaming_net

  spark-master:
    image: bitnamilegacy/spark:3.4
    container_name: spark_master
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    ports:
      - "${SPARK_PORT:-8081}:8080"
      - "7077:7077"
    volumes:
      - ./:/app
    networks:
      - streaming_net

  spark-worker:
    image: bitnamilegacy/spark:3.4
    container_name: spark_worker
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    volumes:
      - ./:/app
    depends_on:
      - spark-master
    networks:
      - streaming_net

  spark-submitter:
    image: bitnamilegacy/spark:3.4
    container_name: spark_submitter
    volumes:
      - ./src:/app/src
    command: >
      spark-submit 
      --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.4.0 
      --py-files /app/spark_schema.py
      --master spark://spark-master:7077 
      /app/spark_processor.py
    depends_on:
      - spark-master
      - spark-worker
    networks:
      - streaming_net

  cassandra:
    image: cassandra:4.1
    container_name: cassandra
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "nodetool status"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - streaming_net

  cassandra-init:
    image: cassandra:4.1
    container_name: cassandra_init
    volumes:
      - ./docker/init_scripts/init.cql:/init.cql
    command: >
      bash -c "echo 'Waiting for the Cassandra Native Transport Port...';
      sleep 10; 
      cqlsh cassandra 9042 -f /init.cql;
      echo 'Cassandra completely initialized!'"
    depends_on:
      cassandra:
        condition: service_healthy
    networks:
      - streaming_net

  airflow-init:
    build: 
      context: .
      dockerfile: docker/airflow/Dockerfile.airflow
    container_name: airflow_init
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASS}@postgres:5432/${POSTGRES_DB}
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__AUTH_MANAGER=airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      - AIRFLOW_ADMIN_USERNAME=${AIRFLOW_USERNAME}
      - AIRFLOW_ADMIN_PASSWORD=${AIRFLOW_PASS}
      - AIRFLOW_ADMIN_EMAIL=${AIRFLOW_EMAIL}
      - AIRFLOW__CORE__EXECUTION_API_SERVER_URL=http://airflow_webserver:8080/execution/
      - AIRFLOW__API_AUTH__JWT_SECRET=${JWT_SECRET}
      - AIRFLOW__WEBSERVER__SECRET_KEY=${WEBSERVER_KEY}
    command: >
      bash -c "airflow db migrate && 
      airflow users create --username $${AIRFLOW_ADMIN_USERNAME} --password $${AIRFLOW_ADMIN_PASSWORD} --firstname Admin --lastname User --role Admin --email $${AIRFLOW_ADMIN_EMAIL}"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - streaming_net

  airflow-webserver:
    build: 
      context: .
      dockerfile: docker/airflow/Dockerfile.airflow
    container_name: airflow_webserver
    restart: always
    ports:
      - "8080:8080"
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASS}@postgres:5432/${POSTGRES_DB}
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__AUTH_MANAGER=airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__EXECUTION_API_SERVER_URL=http://airflow_webserver:8080/execution/
      - AIRFLOW__API_AUTH__JWT_SECRET=${JWT_SECRET}
      - AIRFLOW__WEBSERVER__SECRET_KEY=${WEBSERVER_KEY}
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./logs:/opt/airflow/logs
    command: airflow api-server -p 8080
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - streaming_net

  airflow-scheduler:
    build: 
      context: .
      dockerfile: docker/airflow/Dockerfile.airflow
    container_name: airflow_scheduler
    restart: always
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASS}@postgres:5432/${POSTGRES_DB}
      - AIRFLOW__CORE__AUTH_MANAGER=airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__EXECUTION_API_SERVER_URL=http://airflow_webserver:8080/execution/
      - AIRFLOW__API_AUTH__JWT_SECRET=${JWT_SECRET}
      - AIRFLOW__WEBSERVER__SECRET_KEY=${WEBSERVER_KEY}
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./logs:/opt/airflow/logs
    command: airflow scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - streaming_net

  
  airflow-processor:
    build: 
      context: .
      dockerfile: docker/airflow/Dockerfile.airflow
    container_name: airflow_processor
    restart: always
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASS}@postgres:5432/${POSTGRES_DB}
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__EXECUTION_API_SERVER_URL=http://airflow_webserver:8080/execution/
      - AIRFLOW__API_AUTH__JWT_SECRET=${JWT_SECRET}
      - AIRFLOW__WEBSERVER__SECRET_KEY=${WEBSERVER_KEY}
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./logs:/opt/airflow/logs
    command: airflow dag-processor
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - streaming_net

networks:
  streaming_net:
    driver: bridge
volumes:
  pg_data:
  cassandra_data:
  kafka_data:
